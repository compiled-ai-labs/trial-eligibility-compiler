name: ci

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"

      - name: System libs for R packages
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install pinned OHDSI R stack
        run: Rscript scripts/install_ohdsi.R

      - name: Install Python deps
        run: python -m pip install duckdb==1.1.3 pyyaml==6.0.2 jsonschema==4.23.0 pytest==8.3.3 ruff==0.6.9

      - name: Lint
        run: ruff check tec tests conftest.py

      - name: Gates 1-4 (pytest; OHDSI execution runs here, not skipped)
        run: python -m pytest -q

      - name: Recompile-equality (Gate 4 half) — MockClient output == committed
        run: |
          python -m tec.compile.cli build --trial NCT03667300 --backend mock --out /tmp/recompiled
          for f in cohort.json manifest.json conventions.json; do
            if ! cmp -s "compiled/NCT03667300/$f" "/tmp/recompiled/$f"; then
              echo "::error::recompile drift in $f"; diff "compiled/NCT03667300/$f" "/tmp/recompiled/$f" || true; exit 1
            fi
          done
          echo "recompile-equality: byte-identical"

      - name: Assert OHDSI-execution gates actually ran (not skipped)
        run: |
          python -m pytest -q tests/test_gate3_fixtures.py tests/test_trcheck.py -rs \
            | tee /tmp/out.txt
          if grep -q "Rscript / OHDSI stack unavailable" /tmp/out.txt; then
            echo "::error::Gate 3 / trcheck skipped in CI — OHDSI stack must be present"; exit 1
          fi
