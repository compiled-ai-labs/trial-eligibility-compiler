name: ci

on:
  push:
  pull_request:

# Python-only CI: lint + the pure-Python gates (Gate 1 structure, Gate 2 coverage,
# the byte-stability/boundary half of Gate 4) + answer-key demotion + backend
# selection + recompile-equality. Fast, no secrets, no network.
#
# The OHDSI-execution gates (Gate 3 and the CirceR half of Gate 4) require the R
# stack and run in .devcontainer, not here; their pytest cases skip when Rscript is
# absent.

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: python -m pip install duckdb==1.1.3 pyyaml==6.0.2 jsonschema==4.23.0 pytest==8.3.3 ruff==0.6.9

      - name: Lint
        run: ruff check tec tests conftest.py

      - name: Gates (pytest; R-gated cases skip without the OHDSI stack)
        run: python -m pytest -q

      - name: Recompile-equality (Gate 4 half) — MockClient output == committed
        run: |
          python -m tec.compile.cli build --trial NCT03667300 --backend mock --out /tmp/recompiled
          for f in cohort.json manifest.json conventions.json; do
            if ! cmp -s "compiled/NCT03667300/$f" "/tmp/recompiled/$f"; then
              echo "::error::recompile drift in $f"; diff "compiled/NCT03667300/$f" "/tmp/recompiled/$f" || true; exit 1
            fi
          done
          echo "recompile-equality: byte-identical"
